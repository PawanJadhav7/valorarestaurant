name: Bug report
description: Report a broken behavior in Valora AI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue clearly.
      placeholder: Explain the bug
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Where did it happen?
      description: Example - onboarding, billing, dashboard, analytics, auth
      placeholder: onboarding / billing / dashboard
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      placeholder: Paste screenshots, logs, or error details here

  - type: input
    id: environment
    attributes:
      label: Environment
      description: local / preview / production
      placeholder: local / preview / production

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: Anything else relevant?
